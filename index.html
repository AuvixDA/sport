<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПУЛЬС — вход</title>
<style>
  :root {
    --bg: #1c1a17;
    --card: #242220;
    --accent: #f2b705;
    --text: #f2f0ea;
    --muted: #9a948c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 32px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  h1 {
    color: var(--accent);
    text-align: center;
    margin: 0 0 24px;
    letter-spacing: 2px;
    font-size: 22px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 16px;
    border-radius: 8px;
    border: 1px solid #3a3631;
    background: #1c1a17;
    color: var(--text);
    font-size: 15px;
  }
  input:focus { outline: 1px solid var(--accent); }
  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #1c1a17;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }
  .error {
    color: #e0554f;
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    min-height: 18px;
  }
  .link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>ПУЛЬС</h1>
    <form id="loginForm">
      <label for="login">Логин</label>
      <input type="text" id="login" autocomplete="username" required>
      <label for="password">Пароль</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <button type="submit">Войти</button>
      <div class="error" id="errorMsg"></div>
    </form>
    <a class="link" href="student.html">Открыть расписание (для учеников) →</a>
  </div>

<script>
  // Логин и пароль захардкожены здесь.
  // Чтобы сменить — просто поменяй значения ниже.
  const TRAINER_LOGIN = "trainer";
  const TRAINER_PASSWORD = "pulse2024";

  const form = document.getElementById("loginForm");
  const errorMsg = document.getElementById("errorMsg");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const login = document.getElementById("login").value.trim();
    const password = document.getElementById("password").value;

    if (login === TRAINER_LOGIN && password === TRAINER_PASSWORD) {
      sessionStorage.setItem("pulse_trainer_auth", "1");
      window.location.href = "trainer.html";
    } else {
      errorMsg.textContent = "Неверный логин или пароль";
    }
  });
</script>
</body>
</html>
