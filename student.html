<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПУЛЬС — расписание</title>
<style>
  :root {
    --bg: #1c1a17;
    --card: #242220;
    --row: #2b2823;
    --accent: #f2b705;
    --text: #f2f0ea;
    --muted: #9a948c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
    min-height: 100vh;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }
  .card { background: var(--card); border-radius: 16px; padding: 20px; }
  .top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .logo { color: var(--accent); font-weight: 700; letter-spacing: 2px; font-size: 20px; margin: 0; }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; }
  .days { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; }
  .day-btn {
    flex: 1; padding: 8px 4px; text-align: center; border-radius: 8px;
    background: var(--row); color: var(--muted); font-size: 13px; cursor: pointer;
    border: none; white-space: nowrap;
  }
  .day-btn.active { background: var(--accent); color: #1c1a17; font-weight: 600; }
  .date-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; text-transform: capitalize; }
  .slot {
    display: flex; align-items: center; gap: 14px; background: var(--row);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .slot-time { font-weight: 700; width: 50px; flex-shrink: 0; }
  .slot-info { flex: 1; min-width: 0; }
  .slot-type { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .participants { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    background: var(--accent); color: #1c1a17; font-size: 11px; font-weight: 700;
    border-radius: 50%; width: 26px; height: 26px; display: flex;
    align-items: center; justify-content: center;
  }
  .slot-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .slot-count.full { color: var(--accent); }
  .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="top">
      <h1 class="logo">ПУЛЬС</h1>
      <div class="status"><span class="dot"></span> обновляется в реальном времени</div>
    </div>

    <div class="days" id="daysRow"></div>
    <div class="date-title" id="dateTitle"></div>
    <div id="slotsList"></div>
  </div>
</div>

<script type="module">
import { db, ref, onValue } from "./firebase-config.js";

const DAY_NAMES = ["ВС","ПН","ВТ","СР","ЧТ","ПТ","СБ"];
const MONTHS = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const WEEKDAY_FULL = ["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];

function formatDateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function getWeekDates() {
  const today = new Date();
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    dates.push(d);
  }
  return dates;
}

const weekDates = getWeekDates();
let selectedDate = weekDates[0];

const daysRow = document.getElementById("daysRow");
function renderDays() {
  daysRow.innerHTML = "";
  weekDates.forEach((d) => {
    const btn = document.createElement("button");
    btn.className = "day-btn" + (formatDateKey(d) === formatDateKey(selectedDate) ? " active" : "");
    btn.textContent = DAY_NAMES[d.getDay()];
    btn.addEventListener("click", () => {
      selectedDate = d;
      renderDays();
      subscribeToDay();
    });
    daysRow.appendChild(btn);
  });
}

function renderDateTitle() {
  const title = document.getElementById("dateTitle");
  title.textContent = `${WEEKDAY_FULL[selectedDate.getDay()]}, ${selectedDate.getDate()} ${MONTHS[selectedDate.getMonth()]}`;
}

function initials(name) {
  return name.trim().split(/\s+/).map(p => p[0]).slice(0, 2).join("").toUpperCase();
}

const slotsList = document.getElementById("slotsList");
function subscribeToDay() {
  renderDateTitle();
  const dateKey = formatDateKey(selectedDate);
  const dayRef = ref(db, `schedule/${dateKey}`);
  onValue(dayRef, (snapshot) => {
    const data = snapshot.val() || {};
    renderSlots(data);
  });
}

function renderSlots(data) {
  slotsList.innerHTML = "";
  const entries = Object.entries(data).sort((a, b) => a[1].time.localeCompare(b[1].time));

  if (entries.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "Пока нет тренировок в этот день";
    slotsList.appendChild(empty);
    return;
  }

  entries.forEach(([id, slot]) => {
    const div = document.createElement("div");
    div.className = "slot";
    const participants = slot.participants ? Object.values(slot.participants) : [];
    const limit = slot.type === "personal" ? 1 : (slot.limit || 6);
    const isFull = participants.length >= limit;

    div.innerHTML = `
      <div class="slot-time">${slot.time}</div>
      <div class="slot-info">
        <div class="slot-type">${slot.type === "personal" ? "персонально" : "групповая"}</div>
        <div class="participants">
          ${participants.slice(0, 4).map(n => `<div class="pill">${initials(n)}</div>`).join("")}
          ${participants.length > 4 ? `<div class="pill">+${participants.length - 4}</div>` : ""}
        </div>
      </div>
      <div class="slot-count ${isFull ? "full" : ""}">${participants.length}/${limit}${isFull ? " заполнено" : ""}</div>
    `;
    slotsList.appendChild(div);
  });
}

renderDays();
subscribeToDay();
</script>
</body>
</html>
